$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://codex-vault.local/schemas/source.schema.yaml"
title: "Source (Layer A)"
description: "Layer A: a repository, website, dataset, docs site, or release collection that the vault tracks. One record per source. Per the taxonomy correction, every ingested repository is its own source record (no aggregation by source_id)."

type: "object"
required:
  - "schema"
  - "schema_version"
  - "record_id"
  - "created_at"
  - "generator"
  - "generator_version"
  - "run_id"
  - "content_hash"
  - "source_id"
  - "requested_ref"
  - "resolved_revision"
  - "resolved_commit"
  - "fetched_at"
  - "platform"
  - "canonical_url"
  - "archived"
  - "primary_domain"
  - "related_domains"
  - "artifact_role"
  - "source_role"
  - "authority_level"
  - "lifecycle_status"
  - "artifact_kind"
  - "acquisition"
  - "revision_resolution"
  - "provenance"
  - "coverage"
  - "target_runtimes"
  - "discovery_context"

properties:
  schema:
    const: "source/v1"
  schema_version:
    type: "string"
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+$"
  record_id:
    type: "string"
    pattern: "^sha256:[0-9a-f]{64}$"
  created_at:
    type: "string"
    format: "date-time"
  generator:
    type: "string"
    minLength: 1
  generator_version:
    type: "string"
    minLength: 1
  run_id:
    type: "string"
    minLength: 1
  content_hash:
    type: "string"
    pattern: "^sha256:[0-9a-f]{64}$"
  source_id:
    type: "string"
    pattern: "^(github:[^/]+/[^/]+|website:[a-zA-Z0-9._-]+(/[^ ]*)?|gitlab:[^/]+/[^/]+|dataset:[^ ]+|release:[^ ]+)$"
  requested_ref:
    type: "string"
    minLength: 1
  resolved_revision:
    type: "string"
    minLength: 1
  resolved_commit:
    type: "string"
    minLength: 1
  upstream_resolved_revision:
    type: "string"
  tree_sha:
    type: "string"
  commit_time:
    type: "string"
    format: "date-time"
  fetched_at:
    type: "string"
    format: "date-time"
  platform:
    enum: ["github", "gitlab", "website", "dataset", "release", "unknown"]
  canonical_url:
    type: "string"
    format: "uri"
  license_spdx:
    type: "string"
  archived:
    type: "boolean"
  # ----- TAXONOMY CORRECTION 2026-06-20 + 2026-06-21 -----
  # primary_domain: intrinsic identity (what the repo fundamentally IS).
  # related_domains: ecosystems it is useful in (drives Obsidian ecosystem coloring).
  # artifact_role: what it provides (drives Obsidian core coloring when source_role=core).
  primary_domain:
    enum: ["hermes-agent", "n8n", "agentfield", "deep-research", "osint",
           "coding-agents", "training-systems", "ai-content-generation",
           "memory-systems", "cross-domain", "general-development",
           "unknown"]
  related_domains:
    type: "array"
    items:
      enum: ["hermes-agent", "n8n", "agentfield", "coding-agents", "training-systems",
             "ai-content-generation", "memory-systems", "cross-domain",
             "general-development"]
  # ----- MULTI-AXIS TAXONOMY 2026-06-21 -----
  # A repo can be classified along multiple axes simultaneously
  # without corrupting primary_domain. Each new field below is
  # controlled by a dedicated vocab file (or is free-form for
  # `topics`). All are optional; records that pre-date this
  # schema bump do not need to be re-annotated.
  #
  # Decision rule (the user asked: "if this repo were rewritten
  # for a different runtime, would the change be trivial?"):
  #   - ecosystems:        frameworks / platforms / execution
  #                        environments the repo belongs to,
  #                        extends, runs on, or integrates with.
  #   - capabilities:      functional abilities the repo provides.
  #                        Independent of the runtime.
  #   - topics:            flexible discovery tags; not strict
  #                        ontology, can include narrower concepts.
  #   - integration_targets: concrete APIs, databases, tools,
  #                          protocols, services, platforms the
  #                          repo connects to.
  #   - project_use_cases: how this source may be useful to my
  #                        own projects.
  ecosystems:
    type: "array"
    items:
      type: "string"
    description: |
      Frameworks, platforms, or execution ecosystems the repo
      belongs to, extends, runs on, or integrates with.
      Controlled vocabulary: see vocab-ecosystems.yaml.
  capabilities:
    type: "array"
    items:
      type: "string"
    description: |
      Functional abilities the repo provides. Independent of the
      runtime. Controlled vocabulary: see vocab-capabilities.yaml.
  topics:
    type: "array"
    items:
      type: "string"
    description: |
      Flexible discovery tags. NOT a strict ontology field and
      can include narrower concepts (e.g. `dark-web`,
      `google-dorks`, `youtube`). Free-form, no controlled vocab.
  integration_targets:
    type: "array"
    items:
      type: "string"
    description: |
      Concrete APIs, databases, tools, protocols, services, or
      platforms the repo connects to. Controlled vocabulary: see
      vocab-integration-targets.yaml.
  project_use_cases:
    type: "array"
    items:
      type: "string"
    description: |
      How this source may be useful to my own projects. Controlled
      vocabulary: see vocab-project-use-cases.yaml.
  reuse_assessment:
    type: "object"
    description: |
      Operator's plan for this source. The vocabulary of
      `intended_use` and `priority` is intentionally small so
      this field can drive a triage queue without over-fitting.
    properties:
      intended_use:
        enum: ["study", "fork", "integrate", "wrap", "vendor", "ignore", "unknown"]
      priority:
        enum: ["high", "medium", "low", "unknown"]
      fit_for_maxios:
        enum: ["high", "medium", "low", "unknown"]
      reasons:
        type: "array"
        items: { type: "string" }
      risks:
        type: "array"
        items: { type: "string" }
      next_action:
        type: "string"
  maturity_signals:
    type: "object"
    description: |
      Observable signals about the repo's health and usability.
      None/null means the signal was not assessed; this is
      deliberately a permissive "soft signal" block — it does
      not gate the strict validator.
    properties:
      license:
        type: ["string", "null"]
      stars:
        type: ["integer", "null"]
      last_commit_at:
        type: ["string", "null"]
        format: "date-time"
      has_tests:
        type: ["boolean", "null"]
      has_docs:
        type: ["boolean", "null"]
      installable:
        type: ["boolean", "null"]
      dockerized:
        type: ["boolean", "null"]
      active:
        type: ["boolean", "null"]
      notes:
        type: "array"
        items: { type: "string" }
  artifact_role:
    enum: ["n8n-workflow", "agent-skill", "agent-soul", "agent-profile", "agent-prompt",
           "agent-tool-definition", "plugin-definition", "executable-script",
           "configuration", "deployment-definition", "supporting-resource",
           "documentation", "reference", "agent-platform", "agent-platform-integration",
           "agent-optimization", "agent-implementation", "example-agent",
           "control-plane", "plugin-collection", "workflow-collection",
           "workflow-catalog", "workflow-authoring-skills", "agent-skill-collection",
           "skill-management-system", "memory-system", "multi-agent-orchestrator",
           "agent-memory-system", "training-integration", "ai-content-pipeline",
           "deployment-package", "deployment-template", "dataset", "unknown"]
  source_role:
    enum: ["core", "official-extension", "community-extension", "integration",
           "reference", "mirror", "fork", "dataset", "example-collection",
           "deployment", "unknown"]
  authority_level:
    enum: ["canonical-upstream", "official", "maintainer", "community", "third-party", "unknown"]
  lifecycle_status:
    enum: ["active", "experimental", "deprecated", "archived", "unmaintained", "unknown"]
  target_runtimes:
    type: "array"
    items:
      enum: ["hermes-agent", "n8n", "agentfield", "claude-code", "openai-codex", "generic", "unknown"]
  discovery_context:
    type: "object"
    required: ["discovered_via"]
    properties:
      discovered_via: { type: "string" }
      discovery_date: { type: "string", format: "date-time" }
      notes: { type: "string" }
  # ----- artifact_kind: 2026-06-21 minimal extension -----
  # Added `agent` (AI agent platforms/shaped repos — distinct from
  # `deployment` (infra) and `repository` (generic)) and `library`
  # (reusable libraries — distinct from `source-code` (generic) and
  # `plugin` (host-extending)) because 11 legitimate source records
  # already use these values. Existing taxonomy and provenance are
  # preserved.
  # ----- TECHNICAL REPO PROFILING + WORKFLOW SYNTHESIS 2026-06-21 -----
  # Concept split (per user spec 2026-06-21):
  #   - TAXONOMY fields (primary_domain, related_domains, ecosystems,
  #     capabilities, topics, integration_targets, project_use_cases,
  #     reuse_assessment, maturity_signals) answer: WHAT IS THIS REPO?
  #   - TECHNICAL PROFILE fields (source_platform, repo_identity,
  #     repo_profile, interfaces, workflow_synthesis) answer: HOW DOES
  #     IT RUN, WHAT CAN IT PROVIDE, AND HOW DOES IT COMPOSE WITH
  #     OTHER REPOS INTO LARGER WORKFLOWS?
  #
  # All new fields are optional and additive. Existing 34 source
  # records do not need to be re-annotated. New sources going
  # forward SHOULD populate these fields (the extractor in
  # `src/codex_vault_pipeline/tools/extract_tech_profile.py` is the
  # deterministic source for them).
  #
  # ----- source_platform -----
  # Required for new sources going forward. The Codex Vault is
  # primarily for GitHub repositories. Existing records MAY be
  # backfilled to `github` deterministically from `source_id` (which
  # starts with `github:<owner>/<repo>`).
  source_platform:
    type: "string"
    enum:
      - "github"
    description: |
      The hosting platform for this source. The Codex Vault is
      primarily for GitHub repositories. Allowed: `github`. Future
      hosts (e.g. `gitlab`, `codeberg`) are deliberately excluded
      until the vault explicitly supports them; the field exists
      so the multi-repo workflow synthesizer can rely on the
      canonical URL shape.
  # ----- repo_identity -----
  # GitHub-specific identity block. `host` is `github.com`. The
  # owner/repo/full_name are deterministic from `source_id` for
  # existing `github:` sources. clone_url/ssh_url are inferred.
  # pinned_commit is the immutable commit this vault is pinned to.
  # upstream_of_fork + fork_intent describe fork relationships.
  repo_identity:
    type: "object"
    description: |
      GitHub-specific identity. `host` is `github.com`; the rest
      of the block is populated by the deterministic extractor
      from the source_id and the resolved commit.
    properties:
      host: { type: "string", enum: ["github.com"] }
      owner: { type: "string" }
      repo: { type: "string" }
      full_name: { type: "string" }
      clone_url: { type: "string", format: "uri" }
      ssh_url: { type: "string" }
      default_branch: { type: "string" }
      pinned_commit: { type: "string" }
      upstream_of_fork: { type: "string" }
      fork_intent:
        type: "string"
        enum: ["study", "fork", "integrate", "vendor", "wrap", "unknown"]
  # ----- repo_profile -----
  # Technical characteristics of the repo: languages, dependency
  # manifests, runtime stack, build/test systems, entrypoints,
  # services, data stores, config files. All derivable from the
  # raw/ tree by the deterministic extractor; no manual annotation
  # required for new sources.
  repo_profile:
    type: "object"
    description: |
      Technical profile of the repo. All subfields are
      deterministically derivable from the raw/ tree by
      `src/codex_vault_pipeline/tools/extract_tech_profile.py`.
    properties:
      languages:
        type: "array"
        items: { type: "string" }
        description: |
          Programming languages detected by file extensions and
          manifest files (e.g. `python`, `typescript`,
          `rust`, `go`). The list is deduplicated and sorted
          alphabetically.
      language_breakdown:
        type: "object"
        additionalProperties: { type: "number" }
        description: |
          Fractional language shares (0.0–1.0) inferred from
          file extension counts. Best-effort, not exact.
      dependency_manifests:
        type: "array"
        items:
          type: "object"
          properties:
            path: { type: "string" }
            ecosystem: { type: "string" }
            package_manager: { type: "string" }
            dependency_count: { type: "integer" }
            dev_dependency_count: { type: "integer" }
            lockfile_present: { type: "boolean" }
        description: |
          Dependency manifests discovered in the raw/ tree.
          Recognized names: `pyproject.toml`, `requirements*.txt`,
          `setup.py`, `Pipfile`, `poetry.lock`, `package.json`,
          `pnpm-lock.yaml`, `yarn.lock`, `package-lock.json`,
          `go.mod`, `go.sum`, `Cargo.toml`, `Cargo.lock`,
          `Dockerfile`, `docker-compose*.yml`, `helm/Chart.yaml`.
      major_dependencies:
        type: "array"
        items:
          type: "object"
          properties:
            name: { type: "string" }
            ecosystem: { type: "string" }
            version_spec: { type: "string" }
            source_path: { type: "string" }
        description: |
          Major dependencies extracted from each manifest.
          Sensitive values (env vars, tokens) are NEVER parsed
          into semantic text.
      runtime_stack:
        type: "array"
        items: { type: "string" }
        description: |
          Runtime/runtime components the repo depends on
          (e.g. `python>=3.11`, `node>=18`, `docker`, `kubernetes`,
          `postgres`, `redis`).
      build_systems:
        type: "array"
        items: { type: "string" }
        description: |
          Build systems detected (e.g. `make`, `poetry`,
          `npm scripts`, `cargo`, `go build`, `docker build`).
      test_systems:
        type: "array"
        items: { type: "string" }
        description: |
          Test systems detected (e.g. `pytest`, `jest`, `cargo test`,
          `go test`, `n8n workflow tests`).
      entrypoints:
        type: "array"
        items:
          type: "object"
          properties:
            kind: { type: "string" }
            path: { type: "string" }
            command: { type: "string" }
        description: |
          Entry points the repo exposes. `kind` is one of:
          `cli`, `dockerfile`, `compose-service`, `package-script`,
          `python-console-script`, `api-server`, `worker`.
          Detected conservatively: only paths that are
          unambiguous (e.g. files at the repo root with recognized
          names, or script names declared in package.json).
      services:
        type: "array"
        items: { type: "string" }
        description: |
          Named services the repo runs (e.g. `api`, `worker`,
          `db`, `cache`). Detected from docker-compose,
          Kubernetes manifests, and n8n workflow JSONs.
      data_stores:
        type: "array"
        items: { type: "string" }
        description: |
          Data stores the repo depends on (e.g. `postgres`,
          `redis`, `milvus`, `sqlite`, `s3`). Detected from
          dependency manifests, docker-compose env, and
          configuration files. NEVER includes the value of any
          connection string.
      config_files:
        type: "array"
        items: { type: "string" }
        description: |
          Configuration files at the repo root or in recognized
          config dirs (e.g. `pyproject.toml`, `package.json`,
          `docker-compose.yml`, `Dockerfile`, `.env.example`,
          `helm/Chart.yaml`).
  # ----- interfaces -----
  # What surfaces this repo exposes. Each interface is a single
  # entry; multiple interfaces of the same kind are allowed. The
  # `kind` enum is the canonical shape vocabulary for downstream
  # workflow synthesis. Path/protocol/notes are optional metadata.
  interfaces:
    type: "array"
    items:
      type: "object"
      properties:
        kind:
          type: "string"
          enum:
            - "cli"
            - "rest-api"
            - "graphql-api"
            - "python-package"
            - "npm-package"
            - "docker-service"
            - "mcp-server"
            - "mcp-client"
            - "n8n-workflow"
            - "agent-skill"
            - "plugin"
            - "web-ui"
            - "library"
            - "dataset"
            - "unknown"
        name: { type: "string" }
        path: { type: "string" }
        protocol: { type: "string" }
        notes: { type: "string" }
    description: |
      The interfaces this repo exposes to other repos or to the
      outside world. Used by the workflow synthesizer to compose
      multi-repo workflows. Detection is conservative: only
      interfaces that are unambiguous from the raw/ tree are
      included. `kind` is the controlled enum. `name`/`path`/
      `protocol`/`notes` are optional free-form metadata.
  # ----- workflow_synthesis -----
  # How this repo composes into larger workflows with other repos.
  # workflow_roles: how this repo is positioned in a multi-repo
  #   workflow (e.g. `research-agent`, `retrieval-backend`,
  #   `osint-skill`, `vector-store`).
  # provides: things this repo gives to other repos (e.g.
  #   `research-plan`, `cited-report`, `document-search`,
  #   `evidence-items`).
  # requires: things this repo needs from other repos (e.g.
  #   `search-api`, `vector-store`, `documents`).
  # compatible_with: kinds of repos this repo is known to play
  #   well with.
  # composition_edges: typed edges to other repos. The
  #   `relation` enum is the canonical composition vocabulary.
  # composition_notes: human-readable notes about composition
  #   (no secrets, no env values).
  workflow_synthesis:
    type: "object"
    description: |
      How this repo composes with other repos into multi-repo
      workflows. This is the field the multi-repo workflow
      synthesizer reads to stitch workflows together.
    properties:
      workflow_roles:
        type: "array"
        items: { type: "string" }
        description: |
          Roles this repo plays in a workflow (e.g.
          `research-agent`, `retrieval-backend`,
          `osint-skill`, `vector-store`).
      provides:
        type: "array"
        items: { type: "string" }
        description: |
          What this repo provides to other repos (e.g.
          `research-plan`, `cited-report`,
          `document-search`, `vector-search`,
          `evidence-items`).
      requires:
        type: "array"
        items: { type: "string" }
        description: |
          What this repo requires from other repos (e.g.
          `search-api`, `vector-store`, `documents`).
      compatible_with:
        type: "array"
        items: { type: "string" }
        description: |
          Kinds of repos this repo is known to compose well
          with (e.g. `mcp-server`, `rest-api`,
          `vector-store`).
      composition_edges:
        type: "array"
        items:
          type: "object"
          properties:
            relation:
              type: "string"
              enum:
                - "can-feed"
                - "can-call"
                - "can-wrap"
                - "can-index"
                - "can-store-in"
                - "can-deploy-with"
                - "can-orchestrate"
                - "conflicts-with"
                - "requires"
                - "optional"
            target: { type: "string" }
            evidence: { type: "string" }
        description: |
          Typed composition edges from this repo to other
          repos. `target` is a `source_id` (or a generic kind
          token like `vector-store`); `relation` is the
          controlled composition vocabulary; `evidence` is a
          free-form short note.
      composition_notes:
        type: "array"
        items: { type: "string" }
        description: |
          Human-readable composition notes. Free-form; no
          secrets or env values.
  # ----- End of technical-profile block -----
  artifact_kind:
    enum: ["repository", "documentation", "source-code", "workflow", "skill", "plugin",
           "deployment", "website", "dataset", "agent", "library", "unknown"]
  language_policy:
    type: "object"
    required: ["primary", "allowed", "detection_method", "detection_min_confidence"]
    properties:
      primary: { type: "string" }
      allowed: { type: "array", items: { type: "string" } }
      detection_method: { type: "string" }
      detection_min_confidence: { type: "number", minimum: 0.0, maximum: 1.0 }
  acquisition:
    type: "object"
    required: ["status", "expected_files", "acquired_files", "failed_files", "excluded_files", "coverage_ratio", "failure_reasons", "last_attempt_at"]
    properties:
      status: { enum: ["complete", "partial", "failed", "blocked", "not-attempted"] }
      expected_files: { type: "integer", minimum: 0 }
      acquired_files: { type: "integer", minimum: 0 }
      failed_files: { type: "integer", minimum: 0 }
      excluded_files: { type: "integer", minimum: 0 }
      coverage_ratio: { type: "number", minimum: 0.0, maximum: 1.0 }
      failure_reasons: { type: "array" }
      last_attempt_at: { type: "string", format: "date-time" }
  revision_resolution:
    type: "object"
    required: ["status", "confidence"]
    properties:
      # ----- revision_resolution.status: 2026-06-21 minimal extension -----
      # Added `resolved` (successful resolution with resolved_commit
      # populated — distinct from `pinned` (a user-specified literal
      # pin) and the failure states) because 2 legitimate source
      # records already use this value with populated resolved_commit.
      status: { enum: ["pinned", "resolved", "unresolved", "failed", "not-attempted"] }
      confidence: { enum: ["high", "medium", "low", "unknown"] }
      requested_ref: { type: "string" }
      resolved_commit: { type: "string" }
      resolved_at: { type: "string", format: "date-time" }
      notes: { type: "string" }
  provenance:
    type: "object"
    required: ["confidence"]
    properties:
      confidence: { enum: ["high", "medium", "low", "unknown"] }
      discovered_url: { type: "string" }
      discovered_at: { type: "string", format: "date-time" }
      notes: { type: "string" }
  coverage:
    type: "object"
    required: ["status", "expected_files", "acquired_files", "coverage_ratio"]
    properties:
      status: { enum: ["complete", "partial", "sampled", "unknown"] }
      expected_files: { type: "integer", minimum: 0 }
      acquired_files: { type: "integer", minimum: 0 }
      coverage_ratio: { type: "number", minimum: 0.0, maximum: 1.0 }
      notes: { type: "string" }
  # ----- Embedded typed relations -----
  relations:
    type: "array"
    items:
      type: "object"
      required: ["relation", "target_source_id"]
      properties:
        relation:
          enum: ["part-of", "extends", "integrates-with", "wraps", "deploys", "forks",
                 "mirrors", "documents", "examples-for", "depends-on", "implements",
                 "replaces", "supersedes", "duplicate-of", "variant-of", "derived-from", "references"]
        target_source_id: { type: "string", minLength: 1 }
        inferred_from:
          enum: ["text-mining", "explicit-link", "heuristic", "manual"]
        inference_confidence: { type: "number", minimum: 0.0, maximum: 1.0 }
  contributing_dirs:
    type: "array"
    items: { type: "string" }
  # ----- Obsidian cssclasses (DERIVED from primary_domain + source_role + related_domains) -----
  # Per AGENTS.md v3.3 §17: "Ecosystem coloring should derive from related_domains, while
  # core coloring derives from primary_domain + source_role: core."
  cssclasses:
    type: "array"
    items: { type: "string" }

additionalProperties: true
