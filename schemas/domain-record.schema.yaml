$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://codex-vault.local/schemas/domain-record.schema.yaml"
title: "Domain Record (Layer D)"
description: "Layer D: a typed record derived from units (e.g. n8n-workflow, hermes-skill, agentfield-control-plane). Discriminator: record_type."

type: "object"
required:
  - "schema"
  - "schema_version"
  - "record_id"
  - "created_at"
  - "generator"
  - "generator_version"
  - "run_id"
  - "content_hash"
  - "source_record_ids"
  - "parser_name"
  - "parser_version"
  - "record_type"

properties:
  schema:
    const: "domain-record/v1"
  schema_version: { type: "string" }
  record_id: { type: "string", pattern: "^sha256:[0-9a-f]{64}$" }
  created_at: { type: "string", format: "date-time" }
  generator: { type: "string" }
  generator_version: { type: "string" }
  run_id: { type: "string" }
  content_hash: { type: "string", pattern: "^sha256:[0-9a-f]{64}$" }
  source_record_ids:
    type: "array"
    minItems: 1
    items: { type: "string", minLength: 1 }
  parser_name: { type: "string" }
  parser_version: { type: "string" }
  record_type:
    enum: ["n8n-workflow", "n8n-node", "hermes-skill", "hermes-tool", "hermes-provider",
           "hermes-profile", "hermes-soul", "agentfield-agent", "agentfield-service",
           "agentfield-control-plane"]
  # record body — typed by record_type (oneOf branches below)
  n8n_workflow:
    type: "object"
    properties:
      workflow:
        type: "object"
        required: ["name", "node_count", "connection_count", "trigger_types", "node_types",
                   "integrations", "credential_types", "external_hosts", "ai_components",
                   "active", "valid_n8n_document"]
        properties:
          name: { type: "string" }
          node_count: { type: "integer", minimum: 0 }
          connection_count: { type: "integer", minimum: 0 }
          trigger_types: { type: "array", items: { type: "string" } }
          node_types: { type: "array", items: { type: "string" } }
          integrations: { type: "array", items: { type: "string" } }
          credential_types:
            type: "array"
            items: { type: "string" }
            # Validator must reject credential values (strings with key/value patterns), not just names
          external_hosts: { type: "array", items: { type: "string" } }
          ai_components: { type: "array", items: { type: "string" } }
          active: { type: "boolean" }
          valid_n8n_document: { type: "boolean" }
  hermes_soul:
    type: "object"
    properties:
      soul:
        type: "object"
        required: ["scope", "source_repo", "behavior_categories"]
        properties:
          scope: { enum: ["global", "agent-specific", "profile-specific", "repository-specific", "unknown"] }
          source_repo: { type: "string" }
          behavior_categories:
            type: "array"
            items: { enum: ["principles", "constraints", "priorities", "identity", "style", "tool-use-rules"] }

additionalProperties: true
